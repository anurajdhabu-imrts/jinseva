# Reverse proxy in front of the two services.
# Used when deploying with a single nginx host instead of separate
# Docker containers per app.

upstream frontend  { server 127.0.0.1:3000; }
upstream backend   { server 127.0.0.1:5000; }

server {
  listen 80;
  server_name jinalaya.org www.jinalaya.org;
  location / { proxy_pass http://frontend; include /etc/nginx/proxy_params; }
}

server {
  listen 80;
  server_name api.jinalaya.org;
  client_max_body_size 20m;
  location / { proxy_pass http://backend; include /etc/nginx/proxy_params; }
}
