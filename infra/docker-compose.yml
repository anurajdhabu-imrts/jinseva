version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: jinalaya-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jinalaya

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: jinalaya-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/jinalaya
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongo

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: jinalaya-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
